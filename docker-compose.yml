services:
  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=production
      - DOTENV_KEY=${DOTENV_KEY}
      - PORT=8081
      - CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}
      - CLOUDFRONT_KEY_PAIR_ID=${CLOUDFRONT_KEY_PAIR_ID}
      # Add any other env vars needed by your backend
    volumes:
      - ./secrets:/app/secrets:ro # Mount secrets folder read-only
    image: wrangel/globschi-backend:1.4
    ports:
      - "8081:8081"

  frontend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_GOOGLE_MAPS_API_KEY: ${REACT_APP_GOOGLE_MAPS_API_KEY}
        REACT_APP_MAPBOX_ACCESS_TOKEN: ${REACT_APP_MAPBOX_ACCESS_TOKEN}
    image: wrangel/globschi-frontend:1.4
    ports:
      - "3000:80"
    # No environment block for frontend to avoid leaking secrets

networks:
  default:
    driver: bridge
